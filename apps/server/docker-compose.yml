services:
  mysql:
    image: mysql:8.4
    container_name: zenox-mysql
    environment:
      MYSQL_DATABASE: zenox
      MYSQL_USER: zenox
      MYSQL_PASSWORD: zenox_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - zenox_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

volumes:
  zenox_mysql_data:
