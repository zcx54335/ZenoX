server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: zenox-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ZENOX_DB_HOST:127.0.0.1}:${ZENOX_DB_PORT:3306}/${ZENOX_DB_NAME:zenox}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${ZENOX_DB_USERNAME:zenox}
    password: ${ZENOX_DB_PASSWORD:zenox_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deletedAt

springdoc:
  swagger-ui:
    path: /swagger-ui.html

zenox:
  cors:
    allowed-origins: ${ZENOX_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173}
  jwt:
    secret: ${ZENOX_JWT_SECRET:change-this-dev-secret-to-at-least-32-characters}
    access-token-ttl-minutes: 120
    refresh-token-ttl-days: 14
