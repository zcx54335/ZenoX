services:
  mysql:
    image: mysql:8.4
    container_name: zenox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zenox
      MYSQL_USER: zenox
      MYSQL_PASSWORD: zenox_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - zenox_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uzenox -pzenox_dev_password --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  zenox_mysql_data:
